# This workflow will install Python dependencies and run zepplife sports script
name: 爱运动

on:
  schedule:
    # cron 为UTC时区，UTC 00:00 等价于北京时间 08:00 每日执行
    - cron: '00 00 * * *'
  # 支持手动触发运行
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 拉取仓库代码
      - name: Checkout source code
        uses: actions/checkout@v4

      # Python 环境缓存，大幅提速重复运行
      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 配置 Python3.12
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # 执行运动脚本
      - name: Run ZeppLife Sports Script
        run: |
          python zepplife_test.py
